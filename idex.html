<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MeshCore — Decentralized Communication Hub</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#06060e;--s1:#0c0c1a;--s2:#141428;--s3:#1c1c38;--bdr:#252548;--acc:#00e5ff;--acc2:#7c3aed;--grn:#00ff88;--red:#ff2d55;--orn:#ffaa00;--txt:#d0d0f0;--dim:#55557a}
html,body{width:100%;height:100%;overflow:hidden;background:var(--bg);color:var(--txt);font-family:'Consolas','Monaco','Courier New',monospace;font-size:13px}
#app{display:flex;flex-direction:column;height:100%;width:100%}
header{display:flex;align-items:center;justify-content:space-between;padding:0 16px;height:44px;min-height:44px;background:var(--s1);border-bottom:1px solid var(--bdr);z-index:100;flex-wrap:wrap;gap:8px}
.logo{font-weight:bold;font-size:14px;letter-spacing:2px;white-space:nowrap}.logo span{color:var(--acc)}
.hdr-r{display:flex;gap:14px;font-size:10px;color:var(--dim);align-items:center;flex-wrap:wrap}
.hdr-r .v{color:var(--acc);font-weight:bold}
.fp{background:var(--s2);padding:2px 6px;border-radius:3px;font-size:9px;color:var(--acc);border:1px solid var(--bdr);letter-spacing:.5px}
.sd{width:7px;height:7px;border-radius:50%;background:var(--grn);box-shadow:0 0 6px var(--grn);animation:pu 2s infinite;display:inline-block}
@keyframes pu{0%,100%{opacity:1}50%{opacity:.4}}
main{flex:1;display:flex;overflow:hidden;min-height:0}
#sidebar{width:200px;min-width:200px;background:var(--s1);border-right:1px solid var(--bdr);display:flex;flex-direction:column;overflow:hidden}
.sh{padding:10px 12px;font-size:10px;text-transform:uppercase;letter-spacing:2px;color:var(--dim);border-bottom:1px solid var(--bdr)}
#peer-list{flex:1;overflow-y:auto;padding:6px}
.pi{display:flex;align-items:center;gap:8px;padding:7px 8px;border-radius:5px;margin-bottom:3px;cursor:pointer;transition:background .2s}.pi:hover{background:var(--s2)}.pi.me{border:1px solid var(--bdr)}
.pd{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.pd.on{background:var(--grn);box-shadow:0 0 4px var(--grn)}.pd.cn{background:var(--orn);box-shadow:0 0 4px var(--orn);animation:pu 1s infinite}.pd.off{background:var(--red)}
.pn{font-size:11px;font-weight:bold;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.pm{font-size:9px;color:var(--dim)}
.ps{display:flex;gap:1px;align-items:flex-end}.ps span{width:2px;background:var(--acc);border-radius:1px}
#mesh-view{flex:1;position:relative;overflow:hidden;background:radial-gradient(ellipse at center,#0d0d22 0%,var(--bg) 80%)}
#mc{width:100%;height:100%;display:block}
.mo{position:absolute;top:12px;left:12px;font-size:9px;color:var(--dim);pointer-events:none;line-height:1.6}
.mo .t{font-size:11px;color:var(--txt);font-weight:bold;margin-bottom:2px}
#rp{width:360px;min-width:300px;background:var(--s1);border-left:1px solid var(--bdr);display:flex;flex-direction:column;overflow:hidden}
.tabs{display:flex;border-bottom:1px solid var(--bdr);min-height:36px}
.tab{flex:1;display:flex;align-items:center;justify-content:center;gap:4px;padding:8px 4px;cursor:pointer;font-size:10px;color:var(--dim);transition:all .2s;border-bottom:2px solid transparent;text-transform:uppercase;letter-spacing:.5px;white-space:nowrap}
.tab:hover{color:var(--txt);background:var(--s2)}.tab.a{color:var(--acc);border-bottom-color:var(--acc)}
.tc{flex:1;display:none;flex-direction:column;overflow:hidden;min-height:0}.tc.a{display:flex}
#cm{flex:1;overflow-y:auto;padding:12px;display:flex;flex-direction:column;gap:6px}
.mg{max-width:90%;animation:fi .3s}.mg.s{align-self:flex-end}.mg.o{align-self:flex-start}
.mb{padding:7px 10px;border-radius:7px;font-size:11px;line-height:1.5}.mg.s .mb{background:var(--acc2);color:white;border-bottom-right-radius:2px}.mg.o .mb{background:var(--s3);border-bottom-left-radius:2px}
.mh{font-size:9px;color:var(--dim);margin-bottom:2px;display:flex;gap:6px;align-items:center}
.ms{color:var(--acc);font-weight:bold}
.mc{font-family:monospace;font-size:9px;color:var(--orn);opacity:.6;overflow:hidden;max-height:0;transition:max-height .5s}.mc.sh{max-height:30px;margin-bottom:4px}
@keyframes fi{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.sys{text-align:center;font-size:9px;color:var(--dim);padding:3px 8px}
#cib{display:flex;padding:8px;gap:6px;border-top:1px solid var(--bdr);background:var(--s2)}
#ci{flex:1;background:var(--s1);border:1px solid var(--bdr);color:var(--txt);padding:7px 10px;border-radius:5px;font-family:inherit;font-size:11px;outline:none}
#ci:focus{border-color:var(--acc);box-shadow:0 0 8px rgba(0,229,255,.2)}
.sb{background:var(--acc2);border:none;color:white;padding:7px 14px;border-radius:5px;cursor:pointer;font-family:inherit;font-weight:bold;transition:all .2s;font-size:14px}.sb:hover{background:#9b5de5}
#vp{align-items:center;justify-content:center;gap:15px;padding:15px}
#vc{width:100%;height:100px;border-radius:6px;background:var(--s2)}
.vcs{display:flex;gap:12px;align-items:center}
.micb{width:50px;height:50px;border-radius:50%;border:2px solid var(--acc);background:transparent;color:var(--acc);font-size:20px;cursor:pointer;transition:all .3s;display:flex;align-items:center;justify-content:center}
.micb.ac{background:var(--red);border-color:var(--red);color:white;box-shadow:0 0 15px rgba(255,45,85,.4);animation:pu 1.5s infinite}
.vps{display:flex;gap:8px;flex-wrap:wrap;justify-content:center}
.vpe{display:flex;flex-direction:column;align-items:center;gap:4px;padding:8px;border-radius:6px;background:var(--s2);min-width:70px}
.vw{height:18px;display:flex;align-items:center;gap:1px}.vw span{width:2px;background:var(--grn);border-radius:1px;transition:height .1s}
#fp2{padding:12px;gap:8px}
.dz{border:2px dashed var(--bdr);border-radius:6px;padding:30px;text-align:center;color:var(--dim);cursor:pointer;transition:all .3s;font-size:11px}
.dz:hover,.dz.dg{border-color:var(--acc);color:var(--acc);background:rgba(0,229,255,.03)}
.dz .di{font-size:28px;margin-bottom:6px}
#fl{flex:1;overflow-y:auto;display:flex;flex-direction:column;gap:5px;margin-top:4px}
.fli{display:flex;align-items:center;gap:8px;padding:8px;background:var(--s2);border-radius:5px;font-size:10px}
.fli .fi2{font-size:18px}.fli .fn{font-weight:bold;margin-bottom:1px;font-size:11px}.fli .fm{color:var(--dim);font-size:9px}
.fp3{width:100%;height:3px;background:var(--s1);border-radius:2px;overflow:hidden;margin-top:3px}
.fp3b{height:100%;background:linear-gradient(90deg,var(--acc),var(--acc2));transition:width .3s;border-radius:2px}
#ep{position:relative;padding:0}
#ce{width:100%;height:100%;background:var(--s2);border:none;color:var(--txt);padding:15px;font-family:inherit;font-size:12px;line-height:1.6;resize:none;outline:none}
footer{display:flex;align-items:center;justify-content:space-between;padding:0 16px;height:28px;min-height:28px;background:var(--s1);border-top:1px solid var(--bdr);font-size:9px;color:var(--dim);flex-wrap:wrap;gap:6px}
.sts{display:flex;gap:14px}.st{display:flex;align-items:center;gap:3px}.st .v{color:var(--acc)}
.eb{display:flex;align-items:center;gap:4px;color:var(--grn);font-size:9px}
::-webkit-scrollbar{width:5px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:var(--bdr);border-radius:3px}
@media(max-width:1000px){#sidebar{display:none}#rp{width:280px;min-width:240px}}
@media(max-width:700px){main{flex-direction:column}#mesh-view{height:220px;min-height:220px;flex:none}#rp{width:100%;min-width:100%;flex:1}}
</style>
</head>
<body>
<div id="app">
<header>
<div style="display:flex;align-items:center;gap:10px"><div class="logo">🔒 MESH<span>CORE</span></div><div class="sd"></div><span class="fp" id="mfp">...</span></div>
<div class="hdr-r"><div>PEERS <span class="v" id="hp">0</span></div><div>MESH <span class="v" id="hm">SCANNING</span></div><div>E2E <span class="v">AES-256</span></div></div>
</header>
<main>
<aside id="sidebar"><div class="sh">Network Peers</div><div id="peer-list"></div></aside>
<section id="mesh-view"><canvas id="mc"></canvas><div class="mo"><div class="t">⬡ MESH TOPOLOGY</div><div>Links: <span id="cc">0</span></div><div>Route: multi-hop</div><div>Mode: <span id="md">discovery</span></div></div></section>
<section id="rp">
<div class="tabs">
<div class="tab a" data-t="chat" onclick="stab('chat')">💬 Chat</div>
<div class="tab" data-t="voice" onclick="stab('voice')">🎤 Voice</div>
<div class="tab" data-t="files" onclick="stab('files')">📁 Files</div>
<div class="tab" data-t="editor" onclick="stab('editor')">📝 Collab</div>
</div>
<div class="tc a" id="chat"><div id="cm"></div><div id="cib"><input type="text" id="ci" placeholder="Type encrypted message..." onkeydown="if(event.key==='Enter')snd()"><button class="sb" onclick="snd()">⚡</button></div></div>
<div class="tc" id="voice"><canvas id="vc"></canvas><div class="vcs"><button class="micb" id="micb" onclick="tmic()">🎤</button><div style="text-align:center"><div style="font-size:11px;font-weight:bold" id="mst">MUTED</div><div style="font-size:9px;color:var(--dim)">Click to transmit</div></div></div><div class="vps" id="vps"></div></div>
<div class="tc" id="files"><div class="dz" id="dzn"><div class="di">📦</div><div>Drop files to share across mesh</div><div style="font-size:9px;margin-top:4px">Chunked · Encrypted · Distributed</div></div><div id="fl"></div></div>
<div class="tc" id="editor"><textarea id="ce" placeholder="Collaborative document — remote peers will see edits in real-time..."></textarea></div>
</section>
</main>
<footer>
<div class="sts"><div class="st">↑<span class="v" id="su">0</span></div><div class="st">↓<span class="v" id="sd2">0</span></div><div class="st">⏱<span class="v" id="sl">0ms</span></div><div class="st">📦<span class="v" id="sp">0</span></div></div>
<div class="eb">🔐 AES-256-GCM + Ed25519 · E2E Encrypted</div>
</footer>
</div>
<script>
const C=document.getElementById('mc'),X=C.getContext('2d'),VC=document.getElementById('vc');
let rot=0,pkts=0,micOn=false,epoch=0;
const peers=[],packets=[],sparks=[];
const FP=Array.from({length:4},()=>Math.floor(Math.random()*65536).toString(16).padStart(4,'0')).join(':').toUpperCase();
document.getElementById('mfp').textContent=FP;
const self3d={x:0,y:0,z:0};

function rc(){C.width=C.offsetWidth;C.height=C.offsetHeight}
rc();window.addEventListener('resize',rc);

class Peer{
constructor(n){this.name=n;this.id=Math.random().toString(36).slice(2,8);this.status='connecting';this.lat=10+Math.random()*80|0;this.sig=2+Math.random()*2|0;
this.color=`hsl(${Math.random()*360|0},70%,60%)`;const a=Math.random()*Math.PI*2,r=80+Math.random()*100,h=(Math.random()-.5)*120;
this.x=Math.cos(a)*r;this.y=h;this.z=Math.sin(a)*r;this.va=false;this.vl=0;
setTimeout(()=>{this.status='online';rpl();},1500+Math.random()*2000)}}

function stab(t){document.querySelectorAll('.tab').forEach(e=>e.classList.remove('a'));document.querySelectorAll('.tc').forEach(e=>e.classList.remove('a'));
document.querySelector(`.tab[data-t="${t}"]`).classList.add('a');document.getElementById(t).classList.add('a')}

function rpl(){
const l=document.getElementById('peer-list');
l.innerHTML=`<div class="pi me"><div class="pd on"></div><div><div class="pn">You (Local)</div><div class="pm">${FP.slice(0,9)}</div></div></div>`+
peers.map(p=>`<div class="pi"><div class="pd ${p.status==='online'?'on':p.status==='connecting'?'cn':'off'}"></div><div style="flex:1;overflow:hidden"><div class="pn">${p.name}</div><div class="pm">${p.lat}ms · ${p.status}</div></div><div class="ps">${[1,2,3,4].map(i=>`<span style="height:${i*3+2}px;opacity:${i<=p.sig?1:.2}"></span>`).join('')}</div></div>`).join('');
const on=peers.filter(p=>p.status==='online').length;
document.getElementById('hp').textContent=on;
document.getElementById('cc').textContent=on*(on+1)/2|0;
document.getElementById('hm').textContent=on>=3?'STABLE':on>=1?'FORMING':'SCANNING';
document.getElementById('md').textContent=on>=3?'full-mesh':on>=1?'partial':'discovery'}

function esc(t){const d=document.createElement('div');d.textContent=t;return d.innerHTML}
function cipher(n){const c='█▓▒░◆◇●□■△▲▽▼◁▷♦⬡⬢';return Array.from({length:n},()=>c[Math.random()*c.length|0]).join('')}

function sysmsg(t){const c=document.getElementById('cm'),d=document.createElement('div');d.className='sys';d.textContent=t;c.appendChild(d);c.scrollTop=c.scrollHeight}

function addmsg(who,txt,self){
const c=document.getElementById('cm'),ci=cipher(txt.length),m=document.createElement('div');
m.className=`mg ${self?'s':'o'}`;
m.innerHTML=`<div class="mh"><span class="ms">${who}</span><span style="color:var(--orn);font-size:8px">🔒E2E</span><span style="color:var(--dim)">${new Date().toLocaleTimeString()}</span></div><div class="mc sh">${ci}</div><div class="mb" style="opacity:0">${esc(txt)}</div>`;
c.appendChild(m);c.scrollTop=c.scrollHeight;
setTimeout(()=>{m.querySelector('.mc').classList.remove('sh');m.querySelector('.mb').style.opacity='1'},700);
const on=peers.filter(p=>p.status==='online');
if(on.length>0){const fi=self?-1:peers.indexOf(on[Math.random()*on.length|0]),ti=self?(Math.random()*on.length|0):-1;apkt(fi,ti,self?'#7c3aed':'#00e5ff')}
pkts++}

function snd(){const i=document.getElementById('ci'),t=i.value.trim();if(!t)return;i.value='';addmsg('You',t,true);
const on=peers.filter(p=>p.status==='online');
if(on.length>0){const r=on[Math.random()*on.length|0];setTimeout(()=>addmsg(r.name,ares[Math.random()*ares.length|0],false),1200+Math.random()*2500)}}

const ares=["Acknowledged. Mesh integrity confirmed.","Roger. Encrypted route verified.","Copy. Forwarding through relay cluster.","Status: all nodes synchronized.","Hash verified. Payload intact.","Beacon confirmed. Topology stable.","Key rotation complete. Forward secrecy active.","Consensus reached across all peers.","Signal locked. Channel secure.","Retransmitting via optimized path.","Distributed verification passed.","Heartbeat confirmed. Latency nominal."];

function tmic(){micOn=!micOn;const b=document.getElementById('micb'),s=document.getElementById('mst');
b.className=micOn?'micb ac':'micb';s.textContent=micOn?'LIVE':'MUTED';s.style.color=micOn?'var(--red)':'var(--dim)'}

const dz=document.getElementById('dzn');
dz.addEventListener('dragover',e=>{e.preventDefault();dz.classList.add('dg')});
dz.addEventListener('dragleave',()=>dz.classList.remove('dg'));
dz.addEventListener('drop',e=>{e.preventDefault();dz.classList.remove('dg');if(e.dataTransfer.files.length)Array.from(e.dataTransfer.files).forEach(afile)});
dz.addEventListener('click',()=>{const inp=document.createElement('input');inp.type='file';inp.multiple=true;inp.onchange=()=>Array.from(inp.files).forEach(afile);inp.click()});

function afile(f){
const fl=document.getElementById('fl'),sz=f.size<1024?f.size+'B':f.size<1048576?(f.size/1024).toFixed(1)+'KB':(f.size/1048576).toFixed(1)+'MB';
const ext=f.name.split('.').pop().toLowerCase(),icons={pdf:'📄',jpg:'🖼️',png:'🖼️',gif:'🖼️',mp3:'🎵',mp4:'🎬',zip:'📦',txt:'📝',js:'⚡',html:'🌐',css:'🎨',json:'📋'};
const ic=icons[ext]||'📎',it=document.createElement('div');it.className='fli';
it.innerHTML=`<div class="fi2">${ic}</div><div style="flex:1"><div class="fn">${esc(f.name)}</div><div class="fm">${sz} · Encrypting...</div><div class="fp3"><div class="fp3b" style="width:0%"></div></div></div>`;
fl.appendChild(it);let p=0;const bar=it.querySelector('.fp3b'),met=it.querySelector('.fm');
const iv=setInterval(()=>{p+=5+Math.random()*15;if(p>=100){p=100;clearInterval(iv);met.textContent=`${sz} · ✅ Distributed to ${peers.filter(q=>q.status==='online').length} peers`}else met.textContent=`${sz} · ${p|0}%`;bar.style.width=p+'%'},150);
sysmsg(`📦 Sharing "${f.name}" (${sz}) across mesh...`);pkts+=Math.ceil(f.size/1024);
if(peers.length>0)apkt(-1,Math.random()*peers.length|0,'#ffaa00')}

function simfile(name,sz){
const fl=document.getElementById('fl'),szs=sz<1024?sz+'B':(sz/1024).toFixed(1)+'KB',sender=peers.filter(p=>p.status==='online')[0]?.name||'Peer';
const it=document.createElement('div');it.className='fli';
it.innerHTML=`<div class="fi2">📥</div><div style="flex:1"><div class="fn">${name}</div><div class="fm">${szs} · From ${sender} · Receiving...</div><div class="fp3"><div class="fp3b" style="width:0%"></div></div></div>`;
fl.appendChild(it);let p=0;const bar=it.querySelector('.fp3b'),met=it.querySelector('.fm');
const iv=setInterval(()=>{p+=8+Math.random()*18;if(p>=100){p=100;clearInterval(iv);met.textContent=`${szs} · From ${sender} · ✅ Decrypted`}else met.textContent=`${szs} · From ${sender} · ${p|0}%`;bar.style.width=p+'%'},200);
sysmsg(`📥 Receiving "${name}" from ${sender}`)}

function apkt(fi,ti,col){packets.push({fi,ti,p:0,c:col||'#00e5ff',s:.008+Math.random()*.015})}

function gn(i){if(i<0)return self3d;return i<peers.length?peers[i]:self3d}

function p3d(x,y,z){const c=Math.cos(rot),s=Math.sin(rot),rx=x*c-z*s,rz=x*s+z*c,sc=450/(450+rz+200);return{x:rx*sc,y:y*sc,s:sc,z:rz}}

function drawMesh(){
const w=C.width,h=C.height,cx=w/2,cy=h/2,t=Date.now()*.001;
X.clearRect(0,0,w,h);rot+=.004;

// Grid floor
X.save();X.globalAlpha=.08;X.strokeStyle='#00e5ff';X.lineWidth=.5;
for(let i=-5;i<=5;i++){const p1=p3d(i*40,-60,-200),p2=p3d(i*40,-60,200);X.beginPath();X.moveTo(cx+p1.x,cy+p1.y);X.lineTo(cx+p2.x,cy+p2.y);X.stroke();
const p3=p3d(-200,-60,i*40),p4=p3d(200,-60,i*40);X.beginPath();X.moveTo(cx+p3.x,cy+p3.y);X.lineTo(cx+p4.x,cy+p4.y);X.stroke()}
X.restore();

// Radar sweep
X.save();const sa=t*.5;X.globalAlpha=.04;
const grad=X.createConicGradient(sa,cx,cy);
grad.addColorStop(0,'#00e5ff');grad.addColorStop(.08,'transparent');grad.addColorStop(1,'transparent');
X.fillStyle=grad;X.beginPath();X.arc(cx,cy,Math.min(w,h)*.4,0,Math.PI*2);X.fill();X.restore();

// Background particles
for(let i=0;i<40;i++){const px=cx+Math.sin(t*.2+i*2.3)*w*.42,py=cy+Math.cos(t*.15+i*1.9)*h*.42;
X.fillStyle=`rgba(0,229,255,${.03+Math.sin(t+i)*.02})`;X.beginPath();X.arc(px,py,1,0,7);X.fill()}

// Sparks
for(let i=sparks.length-1;i>=0;i--){const s=sparks[i];s.life-=.02;if(s.life<=0){sparks.splice(i,1);continue}
s.x+=s.vx;s.y+=s.vy;X.fillStyle=`rgba(0,229,255,${s.life})`;X.beginPath();X.arc(s.x,s.y,1.5*s.life,0,7);X.fill()}

const allN=[{x:self3d.x,y:self3d.y,z:self3d.z,name:'YOU',isSelf:true,color:'#00e5ff'},...peers.filter(p=>p.status!=='connecting')];
const proj=allN.map(n=>{const p=p3d(n.x,n.y,n.z);return{...n,sx:cx+p.x,sy:cy+p.y,sc:p.s,sz:p.z}});
proj.sort((a,b)=>a.sz-b.sz);

// Connections
for(let i=0;i<proj.length;i++)for(let j=i+1;j<proj.length;j++){const a=proj[i],b=proj[j],al=Math.min(a.sc,b.sc);
X.beginPath();X.moveTo(a.sx,a.sy);X.lineTo(b.sx,b.sy);X.strokeStyle=`rgba(0,229,255,${al*.2})`;X.lineWidth=al*1.5;X.stroke();
X.save();X.setLineDash([3,6]);X.lineDashOffset=-t*25;X.strokeStyle=`rgba(0,229,255,${al*.1})`;X.lineWidth=.5;X.beginPath();X.moveTo(a.sx,a.sy);X.lineTo(b.sx,b.sy);X.stroke();X.restore()}

// Packets
for(let i=packets.length-1;i>=0;i--){const pk=packets[i];pk.p+=pk.s;if(pk.p>=1){packets.splice(i,1);continue}
const fn=gn(pk.fi),tn=gn(pk.ti),px3=fn.x+(tn.x-fn.x)*pk.p,py3=fn.y+(tn.y-fn.y)*pk.p,pz3=fn.z+(tn.z-fn.z)*pk.p;
const pp=p3d(px3,py3,pz3),ppx=cx+pp.x,ppy=cy+pp.y;
X.save();X.shadowBlur=12;X.shadowColor=pk.c;X.fillStyle=pk.c;X.beginPath();X.arc(ppx,ppy,3*pp.s,0,7);X.fill();X.restore();
for(let tr=1;tr<=4;tr++){const tp=pk.p-tr*.025;if(tp<0)break;const tx=fn.x+(tn.x-fn.x)*tp,ty=fn.y+(tn.y-fn.y)*tp,tz=fn.z+(tn.z-fn.z)*tp,tp2=p3d(tx,ty,tz);
X.globalAlpha=.25-tr*.05;X.fillStyle=pk.c;X.beginPath();X.arc(cx+tp2.x,cy+tp2.y,2*tp2.s,0,7);X.fill();X.globalAlpha=1}}

// Nodes
proj.forEach(n=>{const sz=(n.isSelf?10:7)*n.sc;
X.save();X.shadowBlur=n.isSelf?30:18;X.shadowColor=n.isSelf?'#00e5ff':n.color;
const g=X.createRadialGradient(n.sx,n.sy,0,n.sx,n.sy,sz);
g.addColorStop(0,'rgba(255,255,255,.9)');g.addColorStop(.4,n.isSelf?'#00e5ff':n.color);g.addColorStop(1,'transparent');
X.fillStyle=g;X.beginPath();X.arc(n.sx,n.sy,sz,0,7);X.fill();X.restore();

if(n.isSelf){const ps=sz+4+Math.sin(t*3)*3;X.strokeStyle=`rgba(0,229,255,${.3+Math.sin(t*3)*.15})`;X.lineWidth=1.5;X.beginPath();X.arc(n.sx,n.sy,ps,0,7);X.stroke();
const ps2=sz+10+Math.sin(t*2)*5;X.strokeStyle=`rgba(0,229,255,.1)`;X.lineWidth=1;X.beginPath();X.arc(n.sx,n.sy,ps2,0,7);X.stroke()}

X.fillStyle=`rgba(220,220,255,${n.sc*.9})`;X.font=`${Math.max(8,10*n.sc)}px Consolas,monospace`;X.textAlign='center';X.fillText(n.name,n.sx,n.sy+sz+12*n.sc)})}

function drawVoice(){
if(!document.getElementById('voice').classList.contains('a'))return;
const vx=VC.getContext('2d');if(VC.width!==VC.offsetWidth||VC.height!==VC.offsetHeight){VC.width=VC.offsetWidth;VC.height=VC.offsetHeight}
const w=VC.width,h=VC.height,t=Date.now()*.001;vx.clearRect(0,0,w,h);
const amp=micOn?25+Math.sin(t*2)*12:4;
vx.beginPath();vx.moveTo(0,h/2);
for(let x=0;x<w;x++){const y=h/2+Math.sin(x*.02+t*5)*amp*.5+Math.sin(x*.05+t*3)*amp*.3+Math.sin(x*.011+t*7)*amp*.2;vx.lineTo(x,y)}
vx.strokeStyle=micOn?'#ff2d55':'rgba(0,229,255,.5)';vx.lineWidth=2;vx.stroke();
vx.beginPath();vx.moveTo(0,h/2);
for(let x=0;x<w;x++){const y=h/2-(Math.sin(x*.02+t*5)*amp*.5+Math.sin(x*.05+t*3)*amp*.3+Math.sin(x*.011+t*7)*amp*.2);vx.lineTo(x,y)}
vx.strokeStyle=micOn?'rgba(255,45,85,.3)':'rgba(0,229,255,.15)';vx.lineWidth=1;vx.stroke();
// Center line
vx.strokeStyle='rgba(255,255,255,.05)';vx.beginPath();vx.moveTo(0,h/2);vx.lineTo(w,h/2);vx.stroke()}

function rvp(){
const c=document.getElementById('vps'),on=peers.filter(p=>p.status==='online');
c.innerHTML=on.map(p=>`<div class="vpe"><div style="font-size:22px">${p.va?'🗣️':'😶'}</div><div style="font-size:9px;font-weight:bold">${p.name}</div><div class="vw">${[1,2,3,4,5].map(()=>`<span style="height:${p.va?3+Math.random()*14:2}px"></span>`).join('')}</div></div>`).join('')}

function ustat(){
const on=peers.filter(p=>p.status==='online').length;
document.getElementById('su').textContent=(on>0?(Math.random()*5+1).toFixed(1):'0')+' KB/s';
document.getElementById('sd2').textContent=(on>0?(Math.random()*8+2).toFixed(1):'0')+' KB/s';
document.getElementById('sl').textContent=(on>0?10+Math.random()*40|0:0)+'ms';
document.getElementById('sp').textContent=pkts}

const pnames=['Alpha','Bravo','Charlie','Delta','Echo','Foxtrot','Sierra','Tango'];
let pidx=0;

function addpeer(n){const p=new Peer(n);peers.push(p);rpl();sysmsg(`🔍 Discovered peer "${n}" on local mesh`);
setTimeout(()=>{sysmsg(`🔐 E2E handshake with "${n}" complete`);const idx=peers.indexOf(p);if(idx>=0)apkt(-1,idx,'#00e5ff');
for(let i=0;i<8;i++)sparks.push({x:C.width/2,y:C.height/2,vx:(Math.random()-.5)*4,vy:(Math.random()-.5)*4,life:1})},2500);return p}

const edtexts=["# Mesh Network Protocol v2.1\n","## Peer Discovery\n","- Broadcast beacon every 5s on multicast\n","- Verify peer identity via Ed25519 signature\n","- Exchange ephemeral Diffie-Hellman keys\n\n","## Routing Strategy\n","All messages routed through shortest path.\n","Failover: relay through nearest 2 peers.\n","TTL: 8 hops maximum.\n"];
let eidx=0;

function startsim(){
function anp(){if(pidx<pnames.length){addpeer(pnames[pidx]);pidx++;setTimeout(anp,3000+Math.random()*5000)}}
setTimeout(anp,2500);

setInterval(()=>{const on=peers.filter(p=>p.status==='online');
if(on.length>0&&Math.random()>.45){const r=on[Math.random()*on.length|0];addmsg(r.name,ares[Math.random()*ares.length|0],false)}},7000);

setInterval(()=>{const on=peers.filter(p=>p.status==='online');
if(on.length>1){const f=Math.random()*(on.length+1)|0;let t2=Math.random()*(on.length+1)|0;while(t2===f)t2=Math.random()*(on.length+1)|0;
apkt(f-1,t2-1,`hsl(${Math.random()*360|0},70%,60%)`);pkts++}},2500);

setInterval(()=>{const ed=document.getElementById('ce'),on=peers.filter(p=>p.status==='online');
if(on.length>0&&eidx<edtexts.length&&Math.random()>.5&&document.activeElement!==ed){
const txt=edtexts[eidx];let ci=0;const iv=setInterval(()=>{if(ci<txt.length&&document.activeElement!==ed){ed.value+=txt[ci];ci++}else clearInterval(iv)},40+Math.random()*30);
eidx++}},6000);

setTimeout(()=>{if(peers.filter(p=>p.status==='online').length>0)simfile('mesh_topology.json',2400)},14000);
setTimeout(()=>{if(peers.filter(p=>p.status==='online').length>1)simfile('encrypted_keys.gpg',8700)},28000);
setTimeout(()=>{if(peers.filter(p=>p.status==='online').length>2)simfile('consensus_log.dat',15300)},42000);

setInterval(ustat,2000);
setInterval(()=>{peers.forEach(p=>{p.va=Math.random()>.65;p.vl=p.va?Math.random():0});rvp()},2000)}

function loop(){drawMesh();drawVoice();epoch++;requestAnimationFrame(loop)}

sysmsg('🔑 Generating Ed25519 keypair...');
setTimeout(()=>{sysmsg('✅ Identity: '+FP);sysmsg('📡 Scanning local network for peers...')},800);
rpl();startsim();loop();
</script>
